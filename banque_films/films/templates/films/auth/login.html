{% extends 'films/base.html' %}
{% block title %}Connexion — CinéBase{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-header bg-dark text-white">
        <h4 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Connexion</h4>
      </div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
            {% endif %}
          </div>
          {% endfor %}
          <button type="submit" class="btn btn-dark w-100">
            <i class="bi bi-box-arrow-in-right"></i> Se connecter
          </button>
        </form>
        <hr>
        <p class="text-center mb-0">
          Pas encore de compte ? <a href="{% url 'register' %}">S'inscrire</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
